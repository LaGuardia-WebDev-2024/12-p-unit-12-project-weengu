<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Denk+One&family=Freckle+Face&family=New+Amsterdam&display=swap" rel="stylesheet">
  <body>
    <h1 class="font">Quiz About [Tony]</h1>
    <hr />
    <!-- Movie Question -->
    <form id="movie-form">
      <label class="font">
        🍽 What is my favorite food?
        <select id="movie-answer">
          <option value="movie1">sushi</option>
          <option value="movie2">salad</option>
          <option value="movie3">spagetti</option>
          <option value="movie4">hamburger</option>
        </select>
      </label>
      <button type="submit">Check food Answer</button>
    </form>
    <div id="movie-result">
      <p id="movie-text"></p>
       <img id="spagetti"
        src="https://media.lacucinaitaliana.com/photos/5ead808cca16d9a40097954b/master/w_900,c_limit/sopranos%204.jpghttps://media.lacucinaitaliana.com/photos/5ead808cca16d9a40097954b/master/w_900,c_limit/sopranos%204.jpg" width="300">
    </div>
   
    <hr />
    <!-- Book Question -->
    <form id="book-form">
      <h2> 📽</h2>
      <label class="font">
         What is my favorite thing to watch?
        <select id="book-answer">
          <option value="book1">cooking channel</option>
          <option value="book2">history channel</option>
          <option value="book3">reality tv</option>
          <option value="book4">cartoons</option>
        </select>
      </label>
      <button type="submit">Check Book Answer</button>
    </form>
    <div id="book-result">
      <p id="book-text"></p>
      <img id="history"
       src="https://y.yarn.co/d05f597b-f1af-4a51-b111-0c476a72c0fd_text.gif">
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
    $("img").hide();
      //========================Movie Question jQuery Code]
     
      $("#movie-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#movie-answer");
        var answer = $answer.val();

        if (answer === "movie3"){
          $("#movie-text").text("YESSSS!");
          $("#spagetti").hide().fadeIn(5000);
        } 
        else {
          $("#movie-text").text("Try Again!");
        }
      });

      //=======================Book Question jQuery Code
      $("#book-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#book-answer");
        var answer = $answer.val();

        if (answer === "book2") {
          $("#book-text").text("YESSSS!");
          $("#history").hide().fadeIn(5000)
        } 
        else {
          $("#book-text").text("Try Again!");
        }
      });
      
    </script>
  </body>

  <!--- Taken From Khan Academy HTML/JS: Making webpages interactive with jQuery-->
</html>
